<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Application Optimizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#ecfdf5',
              100: '#d1fae5',
              200: '#a7f3d0',
              300: '#6ee7b7',
              400: '#34d399',
              500: '#10b981',
              600: '#059669',
              700: '#047857',
              800: '#065f46',
              900: '#064e3b',
              950: '#022c22',
            },
          }
        }
      }
    }
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .font-serif {
      font-family: 'Playfair Display', serif;
    }

    /* Custom scrollbar for chat container */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Icon Gradient Mask */
    .icon-mask-gradient {
      background: linear-gradient(to right, #059669, #0891b2);
      /* emerald-600 to cyan-600 */
      -webkit-background-clip: padding-box;
      background-clip: padding-box;
    }

    .icon-mask-gradient svg {
      background: linear-gradient(to right, #059669, #0891b2);
      -webkit-mask: currentColor;
      mask: currentColor;
      -webkit-mask-size: contain;
      mask-size: contain;
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      color: transparent;
    }

    /* Orbital Beam Animation */
    .orbital-beam {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      border: 1px solid transparent;
      pointer-events: none;
      z-index: 10;
    }

    .group:hover .orbital-beam {
      border-top-color: #10b981;
      /* emerald-500 */
      animation: orbit 2s linear infinite;
    }

    @keyframes orbit {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>

</head>

<body class="bg-white text-slate-900 h-screen overflow-x-hidden selection:bg-emerald-100 selection:text-emerald-800">
  <div id="root" class="h-full w-full"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
